function Logo({src,name,size=44}){
  const [err,setErr]=useState(false);
  const fb=`https://www.google.com/s2/favicons?domain=${new URL(src.startsWith('http')?src:'https://'+src).hostname}&sz=128`;
  if(err) return <div style={{width:size,height:size,borderRadius:10,background:"linear-gradient(135deg,#00D4FF,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:size*0.38,flexShrink:0}}>{name[0]}</div>;
  return <img src={src} alt={name} onError={()=>setErr(true)} style={{width:size,height:size,objectFit:"contain",borderRadius:10,background:"white",flexShrink:0}}/>;
}
